
<style>
p[name]{
    background:yellow;
}
p[name="p1"]{
    background:red;
}
p[name~="p2"]{
    background:green;
}
p[name^="p3"]{
    background:grey;
}
p[name$="p4"]{
    background:purple;
}
p[name="p5"]{
    background:orange;
}
p.highlight:hover{
    color: #ff0000
}
</style>
</head>
<body>
    <p>Selección</p>
    <p name="p">p.</p>
    <p name="p1">p1.</p>
    <p name="** p2 **">p2.</p>
    <p name="p3****">p3.</p>
    <p name="***p4">p4.</p>
    <p name="****p5****">p5.</p>
    <p class="highlight">Aplicamos regla</p>
</body>
